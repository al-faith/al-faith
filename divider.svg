<svg width="100%" height="40" viewBox="0 0 800 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="20" x2="800" y2="20" stroke="#21262d" stroke-width="1"/>

  <rect x="-200" y="18" width="200" height="4" fill="url(#g)">
    <animate attributeName="x" from="-200" to="800" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <circle cx="400" cy="20" r="3" fill="#A78BFA">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
